<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutOfTheGrid TV - Smart Mobile</title>
    <style>
        :root { --main: #00f2ff; --bg: #000; --panel: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            height: 100vh; overflow: hidden; 
        }

        /* --- SIDEBAR PC --- */
        #sidebar { 
            width: 260px; background: #111; display: flex; 
            flex-direction: column; border-right: 1px solid #222;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .brand { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .brand h1 { font-size: 0.9rem; letter-spacing: 2px; color: var(--main); margin: 0; }
        .menu { padding: 15px; flex-grow: 1; overflow-y: auto; }
        .btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; background: #1a1a1a; 
            border: 1px solid #333; color: #888; cursor: pointer; border-radius: 6px; 
            text-align: left; font-size: 13px; transition: 0.2s;
        }
        .btn.active { background: var(--main); color: #000; font-weight: bold; }

        /* --- VIEWPORT VIDEO --- */
        #tv-viewport { 
            flex-grow: 1; display: flex; align-items: center; 
            justify-content: center; background: #000; position: relative;
        }

        .video-container {
            width: 100%; position: relative; 
            padding-bottom: 56.25%; height: 0; overflow: hidden;
        }

        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* --- MOBILE SPECIFICO --- */
        @media (max-width: 768px) {
            #sidebar { 
                position: absolute; top: 0; left: 0; width: 100%; 
                height: auto; border-right: none; border-bottom: 1px solid var(--main);
                transform: translateY(0); /* Parte visibile */
            }

            /* Classe per nascondere la barra su mobile */
            #sidebar.hidden { transform: translateY(-100%); }

            .menu { display: flex; overflow-x: auto; gap: 10px; padding: 10px; }
            .btn { width: auto; white-space: nowrap; margin-bottom: 0; }
            
            .brand { display: none; } /* Riduciamo l'ingombro su mobile */
        }

        #noise { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://media.giphy.com/media/oEI9uWUqWMrBK/giphy.gif') center/cover; 
            opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.2s; 
        }
    </style>
</head>
<body onclick="showMenuMobile()">

<div id="sidebar" id="sidebar">
    <div class="brand"><h1>OUT OF THE GRID</h1></div>
    <div class="menu">
        <button class="btn active" onclick="tune('PLDyER2xMpvIijTTnK2zuBeIO1QdSeDerN', this)">CH 01 | HUB</button>
        <button class="btn" onclick="tune('PLDyER2xMpvIijTTnK2zuBeIO1QdSeDerN', this)">CH 02 | EDUCATIONAL</button>
        <button class="btn" onclick="tune('PLir6T8-35S8pYvM2fO5a9l6L6yF1_p6r0', this)">CH 03 | DISCOVERY</button>
    </div>
</div>

<div id="tv-viewport">
    <div class="video-container">
        <div id="noise"></div>
        <iframe id="tv-engine" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    let hideTimeout;
    const sidebar = document.getElementById('sidebar');

    function showMenuMobile() {
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('hidden');
            clearTimeout(hideTimeout);
            // Nasconde dopo 3 secondi di inattività
            hideTimeout = setTimeout(() => {
                sidebar.classList.add('hidden');
            }, 3000);
        }
    }

    function tune(id, btn) {
        const noise = document.getElementById('noise');
        const player = document.getElementById('tv-engine');
        noise.style.opacity = "0.8";
        
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Sincronizzazione ora
        const now = new Date();
        const start = (now.getMinutes() * 60) + now.getSeconds();

        setTimeout(() => {
            player.src = `https://www.youtube.com/embed/videoseries?list=${id}&autoplay=1&mute=1&start=${start}&enablejsapi=1`;
            setTimeout(() => { noise.style.opacity = "0"; }, 500);
        }, 300);
        
        // Su mobile, dopo aver cambiato, nascondi subito
        if (window.innerWidth <= 768) {
            setTimeout(() => sidebar.classList.add('hidden'), 1000);
        }
    }

    window.onload = () => {
        document.querySelector('.btn.active').click();
        showMenuMobile(); // Mostra il menu all'avvio
    };
</script>

</body>
</html>
