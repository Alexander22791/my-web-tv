<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #terminal { padding: 20px; text-shadow: 0 0 5px #00ff41; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal">> <span id="text"></span><span class="cursor">_</span></div>

    <script>
        const data = [
            "Accessing OutOfTheGrid Database...",
            "Decrypting secure protocols...",
            "Status: OFF-GRID CONNECTED.",
            "Welcome, Rebel. Think outside the box.",
            "System ready."
        ];
        let line = 0; let char = 0;
        const target = document.getElementById("text");

        function type() {
            if (char < data[line].length) {
                target.innerHTML += data[line].charAt(char);
                char++;
                setTimeout(type, 50);
            } else if (line < data.length - 1) {
                setTimeout(() => {
                    target.innerHTML += "<br>> ";
                    line++; char = 0;
                    type();
                }, 1000);
            }
        }
        type();
    </script>
</body>
</html>
